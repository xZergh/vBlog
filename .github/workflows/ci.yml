name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next/package-lock.json
      - run: npm ci
      - run: npm run test

  sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sanity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sanity/package-lock.json
      - run: npm ci
      - run: npm run test
